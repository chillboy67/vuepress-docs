version: '3.8'

services:
  node-api:
    build: ./server
    container_name: node-api
    restart: always
    volumes:
      - ./server:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: vuepress-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docs/.vuepress/dist:/usr/share/nginx/html/docs
    depends_on:
      - node-api
